<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>readyHub — платформа готовых решений для бизнеса</title>
    <meta
      name="description"
      content="Готовые решения для бизнеса в одном месте: отдельные инструменты и комплексные наборы под задачи компании."
    />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap"
    />
    <script type="module" crossorigin src="./assets/index-B5cXtOqx.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-Daqqnkd7.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        const isGitHubPages = window.location.hostname.endsWith("github.io");
        const usesRawViteEntry = Array.from(document.scripts).some((script) =>
          script.src.includes("/src/main.github-pages.tsx"),
        );

        if (isGitHubPages && usesRawViteEntry && !window.location.pathname.includes("/docs/")) {
          const basePath = window.location.pathname.endsWith("/")
            ? window.location.pathname
            : window.location.pathname.replace(/\/[^/]*$/, "/");

          window.location.replace(`${basePath}docs/${window.location.search}${window.location.hash}`);
        }
      })();
    </script>
  </body>
</html>
